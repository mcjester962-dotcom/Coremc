<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Plugins | CoreMC Search</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header class="navbar">

<div class="logo">
<a href="{{ url_for('home') }}">
<img src="{{ url_for('static', filename='images/creeper.png') }}">
</a>
<span>CoreMC</span>
</div>

<nav class="menu">

<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('plugins') }}">Plugins</a>

<a href="{{ url_for('mods') }}">Mods</a>

<a href="{{ url_for('maps') }}">Maps</a>

<a href="{{ url_for('skins') }}">Skins</a>

</nav>

<div class="login">
<a href="/login">Login</a>
</div>

</header>


<div class="search-box">

<h1>Search Plugins   </h1>

<form method="POST">

<input type="text" name="search" placeholder="Search plugin..." required>

<button type="submit">Search</button>

</form>

</div>


<div class="plugin-results">

{% for plugin in plugins %}

<a href="{{ url_for('plugin_page', plugin_id=plugin.id) }}" class="plugin-card">

<h3>{{ plugin.name }}</h3>

<p>{{ plugin.tag }}</p>

</a>

{% endfor %}

</div>


</body>
</html>
