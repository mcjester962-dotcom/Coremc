<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | CoreMC</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<header class="navbar">

<div class="logo">
<a href="{{ url_for('home') }}">
<img src="{{ url_for('static', filename='images/creeper.png') }}" alt="logo">
</a>
<span>CoreMC</span>
</div>

<nav class="menu">

<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('plugins') }}">Plugins</a>

<a href="{{ url_for('mods') }}">Mods</a>

<a href="{{ url_for('maps') }}">Maps</a>

<a href="{{ url_for('skins') }}">Skins</a>

</nav>

<div class="login">
<a href="/login">Login</a>
</div>

</header>

<div class="auth-box">
<h2>Login</h2>

<form method="POST">

<input type="text" name="username" placeholder="Username" required>
<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

<p>No account? <a href="/register">Register</a></p>

</form>
</div>

</body>
</html>
