<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="google-site-verification" content="Egp2n5qyynn9ygbu43MLh454pKWyF7eQyOzTuQwOhk4" />
  
<title>Download {{ plugin.name }} | CoreMC</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<header class="navbar">

<div class="logo">

<a href="{{ url_for('home') }}">

<img src="{{ url_for('static', filename='images/creeper.png') }}">
<span>CoreMC</span>

</a>

</div>

<nav class="menu">

<a href="{{ url_for('home') }}">Home</a>

<a href="{{ url_for('plugins') }}">Plugins</a>

<a href="{{ url_for('mods') }}">Mods</a>

<a href="{{ url_for('maps') }}">Maps</a>

<a href="{{ url_for('skins') }}">Skins</a>

</nav>

<div class="login">
<a href="/login">Login</a>
</div>

</header>


<!-- PLUGIN PAGE -->

<div class="plugin-container">

<div class="plugin-header">

<img class="plugin-icon"
src="https://api.spiget.org/v2/resources/{{ plugin.id }}/icon">

<div class="plugin-info">

<h1>{{ plugin.name }}</h1>

<a class="download-btn"
href="{{ url_for('download', plugin_id=plugin.id) }}">

Download

</a>

</div>

</div>


<!-- VERSIONS -->

<div class="plugin-versions">

<h3>Versions</h3>

{% for v in versions %}

<span class="version">{{ v.name }}</span>

{% endfor %}

</div>


<!-- DESCRIPTION -->

<div class="plugin-description">

{{ description | safe }}

</div>

</div>

</body>
</html>
